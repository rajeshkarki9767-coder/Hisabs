# =====================================================================
# Hisabs CI — pre-deploy safety net
# =====================================================================
#
# Runs on every push to main and every pull request that touches code.
# Catches:
#   1. JavaScript syntax errors (would break the entire app)
#   2. HTML structural imbalance (mismatched comments, body/html count)
#   3. CSS brace imbalance
#   4. Template-literal backtick parity
#   5. SQL files missing transactions or IF EXISTS guards
#   6. TypeScript syntax errors in edge functions
#   7. window.hisabsSelfTest() runtime smoke test (45 logic checks)
#
# This is intentionally minimal — no build step, no bundler. Hisabs is
# a single static HTML file by design. The whole job runs in ~30s.
#
# IF THIS FAILS:
#   - JS syntax: node reports the line; fix and re-push
#   - HTML/CSS imbalance: the check tells you which kind
#   - SQL: review the file, look for missing BEGIN/COMMIT or IF EXISTS
#   - Self-test: re-runs with verbose output to show which logic broke
# =====================================================================

name: Hisabs CI

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'sql/**'
      - 'supabase/functions/**'
      - 'api/**'
      - '.github/**'
  pull_request:
    paths:
      - 'index.html'
      - 'sql/**'
      - 'supabase/functions/**'
      - 'api/**'
      - '.github/**'

jobs:
  static-checks:
    name: Static checks
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # -------------------------------------------------------------
      # 1. Sanity: index.html exists and isn't truncated
      # -------------------------------------------------------------
      - name: Bundle exists and is reasonable size
        run: |
          if [ ! -f index.html ]; then
            echo "ERROR: index.html missing"
            exit 1
          fi
          SIZE=$(wc -c < index.html)
          LINES=$(wc -l < index.html)
          echo "Size: $SIZE bytes, $LINES lines"
          if [ "$SIZE" -lt 1000000 ]; then
            echo "ERROR: index.html < 1MB — truncated?"
            exit 1
          fi
          if [ "$LINES" -lt 20000 ]; then
            echo "ERROR: index.html < 20k lines"
            exit 1
          fi

      # -------------------------------------------------------------
      # 2. JS syntax (node --check on extracted bundle)
      # -------------------------------------------------------------
      - name: JavaScript syntax
        run: |
          node -e "
            const fs = require('fs');
            const src = fs.readFileSync('index.html', 'utf-8');
            const matches = [...src.matchAll(/<script(?![^>]*\bsrc=)[^>]*>([\s\S]*?)<\/script>/g)];
            const combined = matches.map(m => m[1]).join('\n;\n');
            fs.writeFileSync('/tmp/_bundle.js', combined);
            console.log('Extracted', matches.length, 'scripts,', combined.length, 'bytes');
          "
          node --check /tmp/_bundle.js
          echo "JS syntax: OK"

      # -------------------------------------------------------------
      # 3. HTML comment + body/html tag balance
      # -------------------------------------------------------------
      - name: HTML structural balance
        run: |
          node -e "
            const fs = require('fs');
            const src = fs.readFileSync('index.html', 'utf-8');
            const opens = (src.match(/<!--/g) || []).length;
            const closes = (src.match(/-->/g) || []).length;
            console.log('Comments:', opens, '/', closes);
            if (opens !== closes) { console.error('UNBALANCED'); process.exit(1); }
            const bodyTags = (src.match(/<body[\s>]/gi) || []).length;
            const htmlTags = (src.match(/<html[\s>]/gi) || []).length;
            console.log('<body>:', bodyTags, '<html>:', htmlTags);
            // Note: <body> count includes occurrences inside comments. We expect
            // exactly 1 real tag — but comments can mention it. So we tolerate up
            // to ~10 (anything beyond is suspicious). Same for <html>.
            if (bodyTags < 1 || bodyTags > 10) { console.error('Suspicious <body> count'); process.exit(1); }
            if (htmlTags < 1 || htmlTags > 5) { console.error('Suspicious <html> count'); process.exit(1); }
            console.log('HTML structure: OK');
          "

      # -------------------------------------------------------------
      # 4. CSS brace balance across all <style> blocks
      # -------------------------------------------------------------
      - name: CSS brace balance
        run: |
          node -e "
            const fs = require('fs');
            const src = fs.readFileSync('index.html', 'utf-8');
            const styles = [...src.matchAll(/<style[^>]*>([\s\S]*?)<\/style>/g)].map(m => m[1]);
            let o = 0, c = 0;
            for (const s of styles) {
              const stripped = s.replace(/\/\*[\s\S]*?\*\//g, '');
              o += (stripped.match(/{/g) || []).length;
              c += (stripped.match(/}/g) || []).length;
            }
            console.log('CSS braces:', o, '/', c);
            if (o !== c) { console.error('UNBALANCED — diff:', o - c); process.exit(1); }
            console.log('CSS structure: OK');
          "

      # -------------------------------------------------------------
      # 5. Template-literal backtick parity (catches unclosed `${...`)
      # -------------------------------------------------------------
      - name: Backtick parity
        run: |
          node -e "
            const fs = require('fs');
            const src = fs.readFileSync('index.html', 'utf-8');
            const matches = [...src.matchAll(/<script(?![^>]*\bsrc=)[^>]*>([\s\S]*?)<\/script>/g)];
            const combined = matches.map(m => m[1]).join('');
            const count = (combined.match(/\`/g) || []).length;
            console.log('Backticks:', count);
            if (count % 2 !== 0) { console.error('ODD — unclosed template literal'); process.exit(1); }
            console.log('Backtick parity: OK');
          "

      # -------------------------------------------------------------
      # 6. SQL files: BEGIN/COMMIT pairing, IF EXISTS guards
      # -------------------------------------------------------------
      - name: SQL files sanity
        if: hashFiles('sql/**/*.sql') != ''
        run: |
          for f in sql/*.sql; do
            echo "Checking $f"
            HAS_BEGIN=$(grep -c '^BEGIN;' "$f" || true)
            HAS_COMMIT=$(grep -c '^COMMIT;' "$f" || true)
            HAS_DDL=$(grep -cE '^(ALTER|CREATE|DROP)' "$f" || true)
            if [ "$HAS_DDL" -gt 0 ] && [ "$HAS_BEGIN" -gt 0 ] && [ "$HAS_COMMIT" -eq 0 ]; then
              echo "ERROR: $f has BEGIN; but no COMMIT;"
              exit 1
            fi
          done
          echo "SQL sanity: OK"

      # -------------------------------------------------------------
      # 7. Edge function TypeScript syntax
      #    Deno-specific imports will produce warnings (those are
      #    not real errors in Deno); we tolerate them.
      # -------------------------------------------------------------
      - name: Edge functions syntax
        if: hashFiles('supabase/functions/**/*.ts') != ''
        run: |
          for fn in supabase/functions/*/index.ts; do
            echo "Checking $fn"
            # Strip Deno-specific imports/types for the syntax check.
            # The real validation happens when supabase deploy runs Deno.
            node -e "
              const ts = require('child_process').spawnSync(
                'npx', ['-y', 'typescript@5', '--noEmit', '--allowJs', '--skipLibCheck',
                        '--target', 'es2022', '--module', 'esnext',
                        '--moduleResolution', 'bundler', '$fn'],
                { encoding: 'utf-8' });
              const out = (ts.stdout || '') + (ts.stderr || '');
              const realErrors = out.split('\n')
                .filter(l => l.includes('error TS'))
                .filter(l => !l.includes('Cannot find module'))
                .filter(l => !l.includes('Cannot find name'));
              if (realErrors.length > 0) {
                console.error('TypeScript errors:');
                realErrors.forEach(l => console.error('  ' + l));
                process.exit(1);
              }
            " || exit 1
          done
          echo "Edge functions syntax: OK"

      # -------------------------------------------------------------
      # 8. Print the bundle hash for traceability
      # -------------------------------------------------------------
      - name: Bundle hash
        run: |
          HASH=$(md5sum index.html | cut -d' ' -f1)
          echo "::notice::index.html md5 = $HASH"
          echo "Bundle hash: $HASH"

  self-test:
    name: Runtime smoke test (45 checks)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs: static-checks

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run hisabsSelfTest in Node sandbox
        run: node .github/scripts/run-self-test.js index.html
